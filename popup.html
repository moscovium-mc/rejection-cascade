<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>RC</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font: 11px/1.4 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
      width: 220px;
      background: #0a0a0a;
      color: #b0b0b0;
      padding: 16px;
    }
    h1 {
      font-size: 13px;
      font-weight: 600;
      color: #e0e0e0;
      margin-bottom: 4px;
      letter-spacing: 0.5px;
    }
    .sub { font-size: 9px; color: #505050; margin-bottom: 16px; }
    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 10px 0;
      padding: 6px 0;
      border-bottom: 1px solid #1a1a1a;
    }
    .row:last-child { border-bottom: none; }
    .label { color: #606060; }
    input[type="checkbox"] {
      width: 14px;
      height: 14px;
      accent-color: #4a4a4a;
      cursor: pointer;
    }
    input[type="range"] {
      width: 80px;
      height: 2px;
      accent-color: #4a4a4a;
      cursor: pointer;
    }
    #val { color: #707070; min-width: 35px; text-align: right; }
    #count {
      font-size: 28px;
      font-weight: 300;
      color: #3a3a3a;
      font-family: 'Helvetica Neue', sans-serif;
    }
    .footer {
      margin-top: 16px;
      padding-top: 10px;
      border-top: 1px solid #1a1a1a;
      font-size: 8px;
      color: #303030;
    }
  </style>
</head>
<body>
  <h1>REJECTION CASCADE</h1>
  <div class="sub">ai training data poisoner</div>

  <div class="row">
    <span class="label">enabled</span>
    <input type="checkbox" id="toggle" checked>
  </div>

  <div class="row">
    <span class="label">probability</span>
    <span id="val">100%</span>
  </div>
  <input type="range" id="slider" min="0" max="100" value="100">

  <div class="row">
    <span class="label">poisoned</span>
    <span id="count">0</span>
  </div>

  <div class="footer">v0.2.0 | research only</div>

  <script src="popup.js"></script>
</body>
</html>
